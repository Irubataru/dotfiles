# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  editor.command:
    global:
    - urxvt
    - -e
    - vim
    - -f
    - '{file}'
    - -c
    - normal {line}G{column0}l
  hints.auto_follow:
    global: unique-match
  qt.force_platform:
    global: null
  url.auto_search:
    global: naive
  url.default_page:
    global: about:blank
  url.searchengines:
    global:
      DEFAULT: https://google.com/search?q={}
  url.start_pages:
    global: https://google.com
